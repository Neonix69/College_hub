services:
  - type: web
    name: college-hub
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "gunicorn collegehub.wsgi:application"
    envVars:
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "college-hub.onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://college-hub.onrender.com"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: college-hub-db
          property: connectionString

databases:
  - name: college-hub-db
    plan: free
